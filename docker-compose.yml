version: "3.9"

services:
  backend:
    build: ./backend
    container_name: visionguard-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./visionguard.db}
      - MODEL_MODE=${MODEL_MODE:-production}
      - CORS_ORIGINS=["http://localhost","http://localhost:80","http://localhost:5173"]
    volumes:
      - backend_data:/app/uploads
      - backend_weights:/app/app/ml/weights
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: visionguard-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_weights:
